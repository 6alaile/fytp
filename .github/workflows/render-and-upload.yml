name: render-and-upload

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      spec:
        description: "Spec file to render (from specs/*.json)"
        type: choice
        required: true
        default: "specs/world_cup_2026.json"
        options: ${{ fromJSON(needs.meta.outputs.specs) }}
      skip_upload:
        description: "Skip YouTube upload (render only)"
        type: boolean
        default: false
      privacy_status:
        description: "YouTube privacy (overrides YT_PRIVACY_STATUS secret and spec)"
        type: choice
        required: false
        default: ""
        options:
          - public
          - unlisted
          - private
          - ""

# Two-stage: the first job discovers spec files for the dispatch dropdown,
# the second does the actual work.
concurrency:
  group: render-and-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Discover specs
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.discover.outputs.specs }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          # List all specs/*.json so the dispatch dropdown is always up to date.
          # _example.json is filtered out — it's a reference, not a renderable spec.
          SPECS=$(ls specs/*.json 2>/dev/null | grep -v '_example' | sort | jq -R . | jq -s 'map(select(length > 0))')
          echo "specs=$SPECS" >> "$GITHUB_OUTPUT"

  render:
    name: Render and upload
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve spec
        id: spec
        run: |
          # Default: world_cup_2026 (the legacy single-spec default).
          # On workflow_dispatch: use the chosen spec.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SPEC_PATH="${{ inputs.spec }}"
          else
            SPEC_PATH="specs/world_cup_2026.json"
          fi
          if [ ! -f "$SPEC_PATH" ]; then
            echo "ERROR: spec file not found: $SPEC_PATH"
            exit 1
          fi
          echo "spec=$SPEC_PATH" >> "$GITHUB_OUTPUT"
          # Read the spec id for naming the artifact.
          SPEC_ID=$(jq -r '.id' "$SPEC_PATH")
          echo "spec_id=$SPEC_ID" >> "$GITHUB_OUTPUT"

      - name: Validate spec
        run: |
          python scripts/spec_schema.py "${{ steps.spec.outputs.spec }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ffmpeg and system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation jq

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache HyperFrames (fonts + Chrome)
        uses: actions/cache@v4
        with:
          path: ~/.cache/hyperframes
          key: hf-cache-v2-${{ runner.os }}-${{ hashFiles('templates/**/*.html', 'scripts/compose.py', 'scripts/kind_renderers.py') }}
          restore-keys: |
            hf-cache-v2-${{ runner.os }}-

      - name: Show memory headroom
        run: |
          echo "Memory:"; free -h
          echo "Disk:"; df -h /

      - name: Render video
        env:
          PIXABAY_API_KEY:       ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY:    ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:   ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: |
          mkdir -p build
          python scripts/compose.py \
            --spec "${{ steps.spec.outputs.spec }}" \
            --output-dir build \
            --quality high
        timeout-minutes: 60

      - name: Verify render output
        run: |
          FINAL="build/${{ steps.spec.outputs.spec_id }}/${{ steps.spec.outputs.spec_id }}.mp4"
          test -f "$FINAL" || (echo "ERROR: $FINAL not found"; ls -R build || true; exit 1)
          ls -lh "$FINAL"
          ffprobe -v error -show_entries \
            stream=codec_name,width,height,r_frame_rate,duration \
            -of default=noprint_wrappers=1 \
            "$FINAL"

      - name: Upload render artifact (push)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.spec.outputs.spec_id }}-${{ github.sha }}
          path: build/${{ steps.spec.outputs.spec_id }}/${{ steps.spec.outputs.spec_id }}.mp4
          retention-days: 90

      - name: Upload render artifact (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.spec.outputs.spec_id }}-${{ github.ref_name }}
          path: build/${{ steps.spec.outputs.spec_id }}/${{ steps.spec.outputs.spec_id }}.mp4
          retention-days: 365

      - name: Upload render artifact (PR preview)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.spec.outputs.spec_id }}-pr-${{ github.event.pull_request.number }}
          path: build/${{ steps.spec.outputs.spec_id }}/${{ steps.spec.outputs.spec_id }}.mp4
          retention-days: 14

      - name: Upload to YouTube
        if: |
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || !inputs.skip_upload)
        env:
          YT_CLIENT_SECRETS_BASE64: ${{ secrets.YT_CLIENT_SECRETS_BASE64 }}
          YT_TOKEN_PICKLE_BASE64:   ${{ secrets.YT_TOKEN_PICKLE_BASE64 }}
          YT_PRIVACY_STATUS:        ${{ github.event.inputs.privacy_status || secrets.YT_PRIVACY_STATUS }}
          YT_THUMBNAIL_PATH:        ${{ secrets.YT_THUMBNAIL_PATH }}
          YT_CAPTIONS_PATH:         ${{ secrets.YT_CAPTIONS_PATH }}
          YT_SPEC_PATH:             ${{ steps.spec.outputs.spec }}
          VIDEO_FILE:               build/${{ steps.spec.outputs.spec_id }}/${{ steps.spec.outputs.spec_id }}.mp4
        run: python scripts/upload_to_youtube.py
        timeout-minutes: 30
